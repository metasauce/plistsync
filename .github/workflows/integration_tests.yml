name: Integration tests
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 4 * * *" # 4:27 every night
env:
  PSYNC_CONFIG_DIR: ${{ github.workspace }}/tests/data/integration_config

jobs:
  test-notebooks:
    runs-on: [self-hosted, linux]
    environment: integration_tests # only scope where our secrets are defined
    strategy:
      fail-fast: false
      matrix:
        service: [tidal, spotify]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: |
          uv sync --group test

      - name: Setup config yaml
        env:
          INTEGRATION_CONFIG_YAML: ${{ secrets.INTEGRATION_CONFIG_YAML }}
        run: |
          mkdir -p $PSYNC_CONFIG_DIR
          f="$PSYNC_CONFIG_DIR/config.yml"
          echo "$INTEGRATION_CONFIG_YAML" > "$f"
          echo "bytes=$(wc -c < "$f" | tr -d ' ')"
          sha256sum "$f" | awk '{print "sha256="$1}'

          uv run python - <<'PY'
          import os, yaml, pathlib, collections.abc

          p = pathlib.Path(os.environ["PSYNC_CONFIG_DIR"]) / "config.yml"
          data = yaml.safe_load(p.read_text(encoding="utf-8"))

          def mask(v):
            if v is None:
              return "null"
            if isinstance(v, bool):
              return str(v).lower()
            if isinstance(v, (int, float)):
              return f"<{type(v).__name__}:{v}>"
            s = v if isinstance(v, str) else str(v)
            # keep output single-line
            s1 = s.replace("\n", "\\n")
            n = len(s1)
            if n <= 6:
              return "*" * n
            return f"{s1[:3]}...{s1[-3:]} (len={n})"

          def walk(obj, prefix=""):
            if isinstance(obj, dict):
              for k, v in obj.items():
                key = str(k)
                new_prefix = f"{prefix}.{key}" if prefix else key
                yield from walk(v, new_prefix)
            elif isinstance(obj, list):
              for i, v in enumerate(obj):
                new_prefix = f"{prefix}[{i}]"
                yield from walk(v, new_prefix)
            else:
              yield prefix, obj

          print("YAML_PARSE_OK=yes")
          print("top_level_type=", type(data).__name__)
          if isinstance(data, dict):
            print("top_level_keys=", sorted(map(str, data.keys())))
          else:
            print("top_level_keys= None (not a mapping)")

          print("== masked leaf values (first3/last3) ==")
          for path, value in walk(data):
            print(f"{path} = {mask(value)}")
          PY

      - name: Setup Spotify token
        if: matrix.service == 'spotify'
        env:
          SPOTIFY_TOKEN_JSON: ${{ secrets.SPOTIFY_TOKEN_JSON }}
        run: |
          mkdir -p $PSYNC_CONFIG_DIR
          f="$PSYNC_CONFIG_DIR/spotify_token.json"
          echo "$SPOTIFY_TOKEN_JSON" > "$f"
          echo "bytes=$(wc -c < "$f" | tr -d ' ')"
          sha256sum "$f" | awk '{print "sha256="$1}'
      - name: Test spotify notebooks
        if: matrix.service == 'spotify'
        run: |
          uv run pytest --nbmake --nbmake-timeout=600 docs/services/spotify/*.ipynb

      - name: Setup Tidal token
        if: matrix.service == 'tidal'
        env:
          TIDAL_TOKEN_JSON: ${{ secrets.TIDAL_TOKEN_JSON }}
        run: |
          mkdir -p $PSYNC_CONFIG_DIR
          f="$PSYNC_CONFIG_DIR/tidal_token.json"
          echo "$TIDAL_TOKEN_JSON" > "$f"
          echo "bytes=$(wc -c < "$f" | tr -d ' ')"
          sha256sum "$f" | awk '{print "sha256="$1}'
      - name: Test tidal notebooks
        if: matrix.service == 'tidal'
        run: |
          uv run pytest --nbmake --nbmake-timeout=600 docs/services/tidal/*.ipynb

      # Spotify secret can change after refresh
      # https://docs.github.com/en/rest/actions/secrets?apiVersion=2022-11-28#create-or-update-an-environment-secret--parameters
      - name: Update Spotify secret from file
        if: (success() || failure()) && matrix.service == 'spotify'
        env:
          GH_TOKEN: ${{ secrets.PAT_UPDATE_SECRETS }}
        run: |
          set -euo pipefail

          TOKEN_FILE="$PSYNC_CONFIG_DIR/spotify_token.json"
          if [[ ! -f "$TOKEN_FILE" ]]; then
            echo "❌ Spotify token file not found at $TOKEN_FILE"
            exit 1
          fi

          TOKEN_CONTENT=$(cat "$TOKEN_FILE")

          # Python script to encode the secrets
          uv pip install pynacl
          uv run ./.github/workflows/update_secret.py metasauce plistsync integration_tests SPOTIFY_TOKEN_JSON "$TOKEN_CONTENT"
