name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # to create GitHub Release
  id-token: write # for PyPI trusted publishing (OIDC)

jobs:
  qa:
    name: Quality gate (ruff/mypy/pytest)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv sync --all-extras
      - name: Ruff
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check --diff .
      - name: mypy
        run: |
          uv run mypy --show-error-codes --check-untyped-defs --config-file ./pyproject.toml ./
      - name: pytest
        run: |
          uv run pytest -v

  build:
    name: Build dists
    needs: qa
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Build
        run: |
          uv build
      - name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/plistsync/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # OIDC "Trusted Publishing" on PyPI (no API token needed).
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
